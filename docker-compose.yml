services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_awesome_dev
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_DSN: postgres://postgres:postgres@db:5432/school_awesome_dev?sslmode=disable
      JWT_SECRET: local-secret
      NODE_ENV: development
    ports:
      - '8080:8080'
    command: ["./server"]

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - '3000:3000'
    command: ["sh", "-c", "cd /app/frontend && npm install && npm run dev -- --host 0.0.0.0"]
    depends_on:
      - app

volumes:
  db-data:
